<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/auth.css">
    <script type="module" src="js/auth.js" defer></script>
    <title>Server login</title>
</head>

<body>
    <div class="container">
        <h1>Вход на сервер</h1>

        <br>
        <br>

        <!-- Login -->
        <div class="input-block">
            <span>Логин</span>
            <input id="login_inp" autocomplete="off" placeholder="login" type="text">
        </div>

        <!-- Password -->
        <div class="input-block">
            <span>Пароль</span>
            <input class="password" id="password_inp" placeholder="password" type="password">
            <button class="view-password" title="Увидеть пароль" id="password_btn">
                <svg xmlns="http://www.w3.org/2000/svg"
                    viewBox="0 0 16 16">
                    <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z" />
                    <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0" />
                </svg>
            </button>
        </div>

        <!-- Error text -->
        <span class="error-block" id="text_spn"></span>
        <br>

        <!-- Login / Register -->
        <button class="auth-button" id="login_btn">Войти</button>
        <button class="other-button" onclick="location.href='/register'">Нет Аккаунта? Зарегистрироваться</button>
    </div>
</body>

</html>
